name: quantumguard
description: Decentralized identity platform for farmers and rural communities
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Blockchain / Wallet
  web3dart: ^2.7.3
  bip39: ^1.0.6
  ed25519_hd_key: ^2.3.1
  walletconnect_flutter_v2: ^2.1.10

  # Local Storage (Offline-first)
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.7.4

  # Biometrics
  local_auth: ^2.1.8
  camera: ^0.10.5+9
  tflite_flutter: ^0.10.4
  image: ^4.1.7

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

  # Location (for land records)
  geolocator: ^10.1.0
  geocoding: ^3.0.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # IPFS
  ipfs_client: ^0.1.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/facenet.tflite
    - assets/images/
    - assets/lottie/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
